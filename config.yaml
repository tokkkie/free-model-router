# ============================================================================
# Free Model Router - 設定ファイル
# ============================================================================

# ============================================================================
# グローバル設定（全プロバイダー共通）
# ============================================================================
global:
  # リクエストタイムアウト（秒）
  # 各プロバイダーへのリクエストがこの時間を超えるとタイムアウト
  timeout_seconds: 15

  # フェイルオーバー設定
  # レート制限エラー（429）発生時のクールダウン時間（秒）
  # 無料APIは通常1時間単位でレート制限がリセットされるため10分に設定
  rate_limit_cooldown_seconds: 600

  # モデル未検出エラー（404/422）発生時のクールダウン時間（秒）
  # tool calling 非対応モデルもこの時間クールダウンされる
  # モデルが削除された場合は短時間で復活しないため1時間に設定
  not_found_cooldown_seconds: 3600

  # ツールサポート検証設定
  # ツールサポートの検証を有効化
  # true: 起動時に各モデルの tool calling サポート状況を確認
  # false: 検証をスキップ（起動が高速化）
  verify_tool_support: true

  # ツールサポート検証のタイムアウト（秒）
  verify_timeout_seconds: 15

  # モデルリストのキャッシュ有効期限（秒）
  # プロバイダーから取得したモデルリストをキャッシュする時間
  model_cache_ttl_seconds: 300

  # キャッシュディレクトリ
  # プロバイダーごとに {provider_name}_tool_support.json が作成される
  cache_dir: .cache

# ============================================================================
# 有効なプロバイダー
# ============================================================================
# 使用するプロバイダーをリストで指定します
# コメントアウトすると無効化されます
# 上から順に試行されます
enabled_providers:
  - openrouter
  # - groq
  # - cerebras
  # - sambanova
  # - ollama

# ============================================================================
# プロバイダー設定
# ============================================================================
# 各プロバイダーの詳細設定
# enabled_providers に含まれていないプロバイダーは無視されます

providers:
  # --------------------------------------------------------------------------
  # OpenRouter - 無料モデルアグリゲーター
  # --------------------------------------------------------------------------
  openrouter:
    # OpenRouter API のベースURL
    base_url: https://openrouter.ai/api/v1

    # モデル優先度キーワード
    # priority が小さいほど優先度が高い（先に試行される）
    # モデル名にこれらのキーワードが含まれる場合、指定した優先度が適用される
    priority_keywords:
      - keywords: [next, 80b, air]
        priority: 1
      - keywords: [super, 480b, 405b]
        priority: 2
      - keywords: [120b, 100b, 70b]
        priority: 3
      - keywords: [31b, 26b, 32b, 33b, 34b]
        priority: 4
      - keywords: [nano, mini, lite, flash]
        priority: 98

    # 除外キーワード
    # モデル名にこれらのキーワードが含まれる場合、自動的に除外される
    exclude_keywords: [dolphin, liquid, arcee]

  # --------------------------------------------------------------------------
  # Groq - 高速推論プロバイダー
  # --------------------------------------------------------------------------
  groq:
    # Groq API のベースURL
    base_url: https://api.groq.com/openai/v1

    # モデルフィルタリング条件
    # 最小コンテキストウィンドウサイズ
    # この値より小さい context_window のモデルは除外される
    min_context_window: 120000

    # 最小最大補完トークン数
    # この値より小さい max_completion_tokens のモデルは除外される
    min_max_completion_tokens: 30000

  # --------------------------------------------------------------------------
  # Cerebras - 超高速推論プロバイダー
  # --------------------------------------------------------------------------
  cerebras:
    # Cerebras API のベースURL
    base_url: https://api.cerebras.ai/v1

    # モデルフィルタリング条件
    # 以下の条件を全て満たすモデルのみ利用可能とする:
    # - capabilities.tools = true
    # - capabilities.tool_choice = true
    # - architecture.modality = "text"
    # - limits.max_context_length >= min_context_window
    # - limits.max_completion_tokens >= min_max_completion_tokens

    # 最小コンテキストウィンドウサイズ
    min_context_window: 120000

    # 最小最大補完トークン数
    min_max_completion_tokens: 30000

    # 注意: Cerebras はレートリミットが厳しいため、
    # 起動時のモデルリスト取得で複数のAPIコールが発生します

  # --------------------------------------------------------------------------
  # SambaNova - 高速推論プロバイダー
  # --------------------------------------------------------------------------
  sambanova:
    # SambaNova API のベースURL
    base_url: https://api.sambanova.ai/v1

    # モデルフィルタリング条件
    # 以下の条件を全て満たすモデルのみ利用可能とする:
    # - context_length >= 128000
    # - max_completion_tokens >= 8192
    # - モデル名に "base" や "-cb" を含まない
    # pricing.completion が大きい順に並べる

    # 最小コンテキストウィンドウサイズ
    min_context_window: 128000

    # 最小最大補完トークン数
    min_max_completion_tokens: 8192

  # --------------------------------------------------------------------------
  # Ollama - ローカルLLM
  # --------------------------------------------------------------------------
  ollama:
    # Ollama サーバーのベースURL
    base_url: http://localhost:11434

    # 使用するモデル名
    # Ollama にインストール済みのモデル名を指定
    model: phi3.5:latest
